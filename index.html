<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>CardPick</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    min-height: 100dvh;
    overflow-x: hidden;
  }
  .nav {
    display: flex; position: fixed; bottom: 0; left: 0; right: 0;
    background: #1a1a2e; border-top: 1px solid #2a2a40; z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav button {
    flex: 1; background: none; border: none; color: #666; font-size: 11px;
    padding: 12px 4px 10px; cursor: pointer; display: flex; flex-direction: column;
    align-items: center; gap: 3px; transition: color 0.2s;
  }
  .nav button.active { color: #7c8cf8; }
  .nav button span.icon { font-size: 20px; }
  .page { display: none; padding: 16px 16px 90px; }
  .page.active { display: block; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; color: #fff; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 20px; }
  .activity-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
  .activity-btn {
    background: #1a1a2e; border: 1.5px solid #2a2a40; border-radius: 12px;
    padding: 16px 8px; cursor: pointer; text-align: center; transition: all 0.15s; color: #aaa;
  }
  .activity-btn:active { transform: scale(0.96); }
  .activity-btn.selected { border-color: #7c8cf8; background: #1e1e3a; color: #fff; }
  .activity-btn .emoji { font-size: 28px; display: block; margin-bottom: 6px; }
  .activity-btn .label { font-size: 12px; font-weight: 500; }
  .results-header {
    font-size: 13px; font-weight: 600; color: #7c8cf8;
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;
  }
  .result-card {
    background: #1a1a2e; border: 1px solid #2a2a40; border-radius: 12px;
    padding: 14px 16px; margin-bottom: 10px;
  }
  .result-card .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .result-card .card-name { font-size: 15px; font-weight: 600; color: #fff; }
  .result-card .card-rate { font-size: 18px; font-weight: 700; color: #4ade80; }
  .result-card .card-detail { font-size: 12px; color: #888; }
  .result-card .card-last4 { font-size: 12px; color: #666; font-family: 'SF Mono', 'Fira Code', monospace; }
  .result-card .card-categories { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .cat-tag { font-size: 11px; padding: 3px 8px; border-radius: 6px; background: #252540; color: #aaa; }
  .cat-tag.active { background: #2d2d5a; color: #7c8cf8; }
  .brand-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 6px; vertical-align: middle;
  }
  .brand-visa { background: #1a73e8; }
  .brand-mastercard { background: #eb5b1c; }
  .brand-amex { background: #2e77bc; }
  .brand-discover { background: #f47b20; }
  .no-selection { text-align: center; color: #444; font-size: 14px; padding: 30px 20px; }
  .cap-card {
    background: #1a1a2e; border: 1px solid #2a2a40; border-radius: 12px;
    padding: 16px; margin-bottom: 12px;
  }
  .cap-card h3 { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 4px; }
  .cap-card .cap-subtitle { font-size: 12px; color: #666; margin-bottom: 10px; }
  .cap-bar-track { height: 8px; background: #252540; border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
  .cap-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .cap-bar-fill.green { background: #4ade80; }
  .cap-bar-fill.yellow { background: #facc15; }
  .cap-bar-fill.red { background: #f87171; }
  .cap-numbers { display: flex; justify-content: space-between; font-size: 12px; color: #888; }
  .cap-input-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .cap-input {
    background: #252540; border: 1px solid #3a3a55; border-radius: 8px;
    color: #fff; font-size: 16px; padding: 8px 12px; width: 120px; text-align: right;
  }
  .cap-input:focus { outline: none; border-color: #7c8cf8; }
  .cap-save {
    background: #7c8cf8; border: none; border-radius: 8px; color: #fff;
    font-size: 13px; font-weight: 600; padding: 8px 16px; cursor: pointer;
  }
  .cap-reset-hint { font-size: 11px; color: #555; margin-top: 4px; }
  .cap-warning { color: #facc15; font-size: 12px; margin-top: 6px; }
  .all-card {
    background: #1a1a2e; border: 1px solid #2a2a40; border-radius: 12px;
    padding: 14px 16px; margin-bottom: 10px;
  }
  .all-card .ac-top { display: flex; justify-content: space-between; align-items: baseline; }
  .all-card .ac-name { font-size: 14px; font-weight: 600; color: #fff; }
  .all-card .ac-last4 { font-size: 12px; color: #666; font-family: 'SF Mono', 'Fira Code', monospace; }
  .all-card .ac-role { font-size: 13px; color: #7c8cf8; margin-top: 2px; }
  .all-card .ac-notes { font-size: 12px; color: #888; margin-top: 4px; line-height: 1.4; }
  .all-card.inactive { opacity: 0.5; }
  .section-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; color: #555; margin: 20px 0 10px;
  }
</style>
</head>
<body>

<div id="page-pick" class="page active">
  <h1>What am I doing?</h1>
  <p class="subtitle">Tap activities, get cards</p>
  <div class="activity-grid" id="activity-grid"></div>
  <div id="results"></div>
</div>

<div id="page-cards" class="page">
  <h1>All Cards</h1>
  <p class="subtitle">Full reference</p>
  <div id="all-cards-list"></div>
</div>

<div id="page-caps" class="page">
  <h1>Cap Tracker</h1>
  <p class="subtitle">Update spend to track bonus limits</p>
  <div id="caps-list"></div>
</div>

<div class="nav">
  <button class="active" data-page="pick"><span class="icon">&#x1F4B3;</span>Pick</button>
  <button data-page="cards"><span class="icon">&#x1F4CB;</span>All Cards</button>
  <button data-page="caps"><span class="icon">&#x1F4CA;</span>Caps</button>
</div>

<script>
// All data is hardcoded — no external input is rendered unsanitized.
// This is a personal offline tool with no user-generated content.

const CARDS = {
  bofa_cr:     { name: "BofA Cash Rewards",  last4: "NEW",  brand: "visa",       exp: "TBD",     status: "active", limit: 8000 },
  amex_bce:    { name: "Amex BCE",           last4: "1003", brand: "amex",       exp: "5/2029",  status: "active", limit: 7000 },
  discover:    { name: "Discover",           last4: "7545", brand: "discover",   exp: "7/2031",  status: "active" },
  custom_cash: { name: "Citi Custom Cash",   last4: "8538", brand: "mastercard", exp: "TBD",     status: "active", limit: 3200 },
  savor_one:   { name: "SavorOne",           last4: "4967", brand: "mastercard", exp: "8/2028",  status: "active", limit: 10000 },
  double_cash: { name: "Citi Double Cash",   last4: "7915", brand: "mastercard", exp: "12/2028", status: "active", limit: 4300 },
  wf_active:   { name: "WF Active Cash",    last4: "8546", brand: "visa",       exp: "2/2029",  status: "active", limit: 4000 },
  chase:       { name: "Chase Amazon",       last4: "2460", brand: "visa",       exp: "11/2026", status: "idle",   limit: 8500 },
  bilt:        { name: "BILT Blue",          last4: "TBD",  brand: "mastercard", exp: "TBD",     status: "active", limit: 1750 },
  bofa_unl:    { name: "BofA Unlimited",     last4: "8836", brand: "visa",       exp: "6/2031",  status: "idle",   limit: 8000 },
  robinhood:   { name: "Robinhood Gold",     last4: "7880", brand: "visa",       exp: "4/2030",  status: "cancelling", limit: 6000 },
};

const DISCOVER_QUARTERS = { "2026-Q2": ["restaurant", "home_improvement"] };

function getQuarterKey() {
  const d = new Date();
  return d.getFullYear() + "-Q" + Math.ceil((d.getMonth() + 1) / 3);
}
function discoverCovers(cat) {
  return (DISCOVER_QUARTERS[getQuarterKey()] || []).includes(cat);
}
function bofaCRBonusActive() { return new Date() < new Date("2026-09-17"); }

const ACTIVITIES = [
  { id: "restaurant",       emoji: "\uD83C\uDF7D\uFE0F", label: "Restaurant" },
  { id: "coffee",           emoji: "\u2615",              label: "Coffee" },
  { id: "movies",           emoji: "\uD83C\uDFAC",        label: "Movies" },
  { id: "entertainment",    emoji: "\uD83C\uDFAE",        label: "Entertainment" },
  { id: "gas",              emoji: "\u26FD",               label: "Gas" },
  { id: "online",           emoji: "\uD83D\uDED2",        label: "Online" },
  { id: "home_improvement", emoji: "\uD83D\uDEE0\uFE0F",  label: "Home Improve" },
  { id: "streaming",        emoji: "\uD83D\uDCFA",        label: "Streaming" },
  { id: "drugstore",        emoji: "\uD83D\uDC8A",        label: "Drugstore" },
  { id: "grocery",          emoji: "\uD83E\uDDFA",        label: "Grocery" },
  { id: "amazon",           emoji: "\uD83D\uDCE6",        label: "Amazon" },
  { id: "rent",             emoji: "\uD83C\uDFE0",        label: "Rent" },
  { id: "casino",           emoji: "\uD83C\uDFB0",        label: "Casino" },
  { id: "other",            emoji: "\uD83D\uDCB3",        label: "Other" },
];

function getCardRecs(actId) {
  const r = [];
  const add = (c, rate, note) => r.push({ cardId: c, rate: rate, note: note });
  switch (actId) {
    case "restaurant": case "coffee":
      if (discoverCovers("restaurant")) add("discover", "5%", "Quarterly bonus (through Jun 30)");
      add("custom_cash", "5%", "Dining as top category \u2022 $500/mo cap");
      add("savor_one", "3%", "Dining category");
      add("double_cash", "2%", "Fallback");
      break;
    case "movies": case "entertainment":
      add("savor_one", "3%", "Entertainment category");
      add("double_cash", "2%", "Fallback");
      break;
    case "gas":
      add("amex_bce", "3%", "Gas stations \u2022 $6K/yr cap");
      add("double_cash", "2%", "Fallback");
      break;
    case "online": case "amazon":
      if (bofaCRBonusActive()) add("bofa_cr", "6%", "First-year bonus (until Sep 17) \u2022 $2,500/qtr cap");
      else add("bofa_cr", "3%", "Online shopping \u2022 $2,500/qtr cap");
      add("amex_bce", "3%", "U.S. online retail \u2022 $6K/yr cap");
      add("double_cash", "2%", "Fallback");
      break;
    case "home_improvement":
      if (discoverCovers("home_improvement")) add("discover", "5%", "Quarterly bonus (through Jun 30)");
      add("double_cash", "2%", "Fallback");
      break;
    case "streaming":
      add("savor_one", "3%", "Streaming category");
      add("double_cash", "2%", "Fallback");
      break;
    case "drugstore":
      add("double_cash", "2%", "Best available rate");
      break;
    case "grocery":
      r.push({ cardId: null, rate: "0%", note: "WinCo = debit/cash only. No credit card rewards." });
      break;
    case "rent":
      add("bilt", "~1%", "Only card that earns on rent. Free, no annual fee.");
      break;
    case "casino":
      add("wf_active", "2%", "Dedicated casino washing card");
      break;
    case "other":
      add("double_cash", "2%", "Flat 2% on everything");
      break;
  }
  return r;
}

const CAPS = [
  { id: "bofa_cr_quarterly", cardId: "bofa_cr", title: "BofA Cash Rewards \u2014 Online Shopping",
    subtitle: bofaCRBonusActive() ? "6% (first-year bonus) \u2192 1% after cap" : "3% \u2192 1% after cap",
    limit: 2500, resetNote: "Resets Jan 1, Apr 1, Jul 1, Oct 1",
    fallback: "Switch to Amex BCE *1003 (3%)" },
  { id: "custom_cash_monthly", cardId: "custom_cash", title: "Citi Custom Cash \u2014 Dining",
    subtitle: "5% \u2192 1% after cap", limit: 500, resetNote: "Resets each billing cycle",
    fallback: "Switch to SavorOne *4967 (3%) or Discover *7545 (5% if quarterly)" },
  { id: "discover_quarterly", cardId: "discover", title: "Discover \u2014 Restaurants & Home Improvement",
    subtitle: "5% \u2192 1% after cap (Apr\u2013Jun 2026)", limit: 1500,
    resetNote: "Resets each quarter. ACTIVATE at discover.com!",
    fallback: "Switch to Citi Custom Cash *8538 (5%) for dining" },
  { id: "amex_bce_yearly", cardId: "amex_bce", title: "Amex BCE \u2014 Online Retail",
    subtitle: "3% \u2192 1% after cap", limit: 6000, resetNote: "Resets annually",
    fallback: "Switch to Citi Double Cash *7915 (2%)" },
];

function getCapSpend(id) { return parseFloat(localStorage.getItem("cap_" + id) || "0"); }
function setCapSpend(id, v) { localStorage.setItem("cap_" + id, v.toString()); }

const ALL_CARDS_INFO = [
  { id: "bofa_cr", role: "Primary \u2014 Online Shopping (6%/3%)", notes: "Choice category: online shopping. 6% until Sep 17 (first-year bonus), then 3%. $2,500/qtr cap, drops to 1% after. Also 2% grocery/wholesale." },
  { id: "amex_bce", role: "Online now / backup after BofA arrives (3%)", notes: "3% U.S. online retail, supermarkets, gas \u2014 each $6K/yr cap (separate). Primary online card until new BofA arrives." },
  { id: "discover", role: "Dining 5% (Apr\u2013Jun 2026)", notes: "Current quarter: Restaurants & Home Improvement through Jun 30. $1,500/qtr cap. ACTIVATE EACH QUARTER at discover.com." },
  { id: "custom_cash", role: "Dining/Coffee 5% (when Discover quarter \u2260 restaurants)", notes: "ONLY use for restaurants/coffee. Auto-detects top category. $500/mo cap. Stash until Jul 1 while Discover covers dining." },
  { id: "savor_one", role: "Backup dining/entertainment (3%)", notes: "3% dining, entertainment, streaming, grocery (not Walmart). Backup if Custom Cash or Discover hit caps." },
  { id: "double_cash", role: "Everything else (2%)", notes: "1% on purchase + 1% on payment = 2%. 5% hotels/car via Citi Travel portal. Flat 2%, no caps." },
  { id: "wf_active", role: "Casino washing (2%)", notes: "Unlimited 2%. Dedicated to sweepstakes volume. Don\u2019t mix bills here." },
  { id: "bilt", role: "Rent (~1%)", notes: "Free card, no annual fee. $1,750 limit \u2014 can\u2019t cover full $1,851 rent yet. Split payment or request CLI in 3-6 months." },
  { id: "chase", role: "Amazon 3% (idle)", notes: "3% Amazon/Whole Foods. Redundant with Amex BCE. Keep for credit age. Exp 11/2026." },
  { id: "bofa_unl", role: "Idle (credit age)", notes: "2% until Dec 26, 2026, then 1.5%. Worse than Double Cash long-term." },
  { id: "robinhood", role: "CANCELLING", notes: "Move all recurring charges off, then cancel Gold subscription." },
];

const selected = new Set();
const actLabels = Object.fromEntries(ACTIVITIES.map(a => [a.id, a.label]));

function el(id) { return document.getElementById(id); }

function h(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.textContent;
}

function renderActivities() {
  const grid = el("activity-grid");
  while (grid.firstChild) grid.removeChild(grid.firstChild);
  ACTIVITIES.forEach(a => {
    const btn = document.createElement("div");
    btn.className = "activity-btn" + (selected.has(a.id) ? " selected" : "");
    const em = document.createElement("span");
    em.className = "emoji";
    em.textContent = a.emoji;
    const lb = document.createElement("span");
    lb.className = "label";
    lb.textContent = a.label;
    btn.appendChild(em);
    btn.appendChild(lb);
    btn.addEventListener("click", () => {
      if (selected.has(a.id)) selected.delete(a.id); else selected.add(a.id);
      renderActivities();
      renderResults();
    });
    grid.appendChild(btn);
  });
}

function renderResults() {
  const box = el("results");
  while (box.firstChild) box.removeChild(box.firstChild);

  if (selected.size === 0) {
    const p = document.createElement("div");
    p.className = "no-selection";
    p.textContent = "Tap what you\u2019re about to do";
    box.appendChild(p);
    return;
  }

  const cardMap = new Map();
  const msgs = [];
  for (const actId of selected) {
    const recs = getCardRecs(actId);
    const top = recs[0];
    if (!top) continue;
    if (!top.cardId) { msgs.push(top.note); continue; }
    if (cardMap.has(top.cardId)) { cardMap.get(top.cardId).activities.push(actId); }
    else cardMap.set(top.cardId, { rate: top.rate, note: top.note, activities: [actId] });
  }

  const entries = [...cardMap.entries()];
  const hdr = document.createElement("div");
  hdr.className = "results-header";
  hdr.textContent = entries.length === 1 ? "Bring this card" : "Bring these " + entries.length + " cards";
  box.appendChild(hdr);

  entries.forEach(([cardId, info]) => {
    const card = CARDS[cardId];
    const rc = document.createElement("div");
    rc.className = "result-card";

    const top = document.createElement("div");
    top.className = "card-top";
    const nameSpan = document.createElement("span");
    nameSpan.className = "card-name";
    const dot = document.createElement("span");
    dot.className = "brand-dot brand-" + card.brand;
    nameSpan.appendChild(dot);
    nameSpan.appendChild(document.createTextNode(card.name));
    const rateSpan = document.createElement("span");
    rateSpan.className = "card-rate";
    rateSpan.textContent = info.rate;
    top.appendChild(nameSpan);
    top.appendChild(rateSpan);
    rc.appendChild(top);

    const detail = document.createElement("div");
    detail.className = "card-detail";
    detail.textContent = info.note;
    rc.appendChild(detail);

    const last4 = document.createElement("div");
    last4.className = "card-last4";
    last4.textContent = "*" + card.last4;
    last4.style.marginTop = "4px";
    rc.appendChild(last4);

    const cats = document.createElement("div");
    cats.className = "card-categories";
    info.activities.forEach(aId => {
      const tag = document.createElement("span");
      tag.className = "cat-tag active";
      tag.textContent = actLabels[aId];
      cats.appendChild(tag);
    });
    rc.appendChild(cats);
    box.appendChild(rc);
  });

  msgs.forEach(m => {
    const mc = document.createElement("div");
    mc.className = "result-card";
    const d = document.createElement("div");
    d.className = "card-detail";
    d.textContent = m;
    mc.appendChild(d);
    box.appendChild(mc);
  });
}

function renderAllCards() {
  const box = el("all-cards-list");
  while (box.firstChild) box.removeChild(box.firstChild);

  const makeSection = (label) => {
    const s = document.createElement("div");
    s.className = "section-label";
    s.textContent = label;
    return s;
  };

  box.appendChild(makeSection("In Rotation"));
  ALL_CARDS_INFO.forEach(info => {
    const card = CARDS[info.id];
    if (card.status !== "active") return;
    box.appendChild(makeCardEl(card, info));
  });

  box.appendChild(makeSection("Idle / Cancelling"));
  ALL_CARDS_INFO.forEach(info => {
    const card = CARDS[info.id];
    if (card.status === "active") return;
    box.appendChild(makeCardEl(card, info, true));
  });
}

function makeCardEl(card, info, inactive) {
  const div = document.createElement("div");
  div.className = "all-card" + (inactive ? " inactive" : "");

  const top = document.createElement("div");
  top.className = "ac-top";
  const name = document.createElement("span");
  name.className = "ac-name";
  const dot = document.createElement("span");
  dot.className = "brand-dot brand-" + card.brand;
  name.appendChild(dot);
  name.appendChild(document.createTextNode(card.name));
  const l4 = document.createElement("span");
  l4.className = "ac-last4";
  l4.textContent = "*" + card.last4 + " \u2022 " + card.exp;
  top.appendChild(name);
  top.appendChild(l4);
  div.appendChild(top);

  const role = document.createElement("div");
  role.className = "ac-role";
  role.textContent = info.role;
  div.appendChild(role);

  const notes = document.createElement("div");
  notes.className = "ac-notes";
  notes.textContent = info.notes;
  div.appendChild(notes);

  return div;
}

function renderCaps() {
  const box = el("caps-list");
  while (box.firstChild) box.removeChild(box.firstChild);

  CAPS.forEach(cap => {
    const spent = getCapSpend(cap.id);
    const pct = Math.min((spent / cap.limit) * 100, 100);
    const card = CARDS[cap.cardId];

    const div = document.createElement("div");
    div.className = "cap-card";

    const title = document.createElement("h3");
    const tdot = document.createElement("span");
    tdot.className = "brand-dot brand-" + card.brand;
    title.appendChild(tdot);
    title.appendChild(document.createTextNode(cap.title));
    div.appendChild(title);

    const sub = document.createElement("div");
    sub.className = "cap-subtitle";
    sub.textContent = cap.subtitle;
    div.appendChild(sub);

    const track = document.createElement("div");
    track.className = "cap-bar-track";
    const fill = document.createElement("div");
    fill.className = "cap-bar-fill " + (pct >= 90 ? "red" : pct >= 70 ? "yellow" : "green");
    fill.style.width = pct + "%";
    track.appendChild(fill);
    div.appendChild(track);

    const nums = document.createElement("div");
    nums.className = "cap-numbers";
    const spentSpan = document.createElement("span");
    spentSpan.textContent = "$" + spent.toFixed(0) + " spent";
    const limitSpan = document.createElement("span");
    limitSpan.textContent = "$" + cap.limit + " cap";
    nums.appendChild(spentSpan);
    nums.appendChild(limitSpan);
    div.appendChild(nums);

    const inputRow = document.createElement("div");
    inputRow.className = "cap-input-row";
    const dollar = document.createElement("span");
    dollar.style.cssText = "color:#888;font-size:13px";
    dollar.textContent = "$";
    const input = document.createElement("input");
    input.className = "cap-input";
    input.type = "number";
    input.inputMode = "decimal";
    input.value = spent;
    const saveBtn = document.createElement("button");
    saveBtn.className = "cap-save";
    saveBtn.textContent = "Save";
    saveBtn.addEventListener("click", () => {
      setCapSpend(cap.id, parseFloat(input.value) || 0);
      renderCaps();
    });
    inputRow.appendChild(dollar);
    inputRow.appendChild(input);
    inputRow.appendChild(saveBtn);
    div.appendChild(inputRow);

    const hint = document.createElement("div");
    hint.className = "cap-reset-hint";
    hint.textContent = cap.resetNote;
    div.appendChild(hint);

    if (pct >= 70) {
      const warn = document.createElement("div");
      warn.className = "cap-warning";
      warn.textContent = "\u26A0 " + cap.fallback;
      div.appendChild(warn);
    }

    box.appendChild(div);
  });
}

document.querySelectorAll(".nav button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".nav button").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    el("page-" + btn.dataset.page).classList.add("active");
    if (btn.dataset.page === "cards") renderAllCards();
    if (btn.dataset.page === "caps") renderCaps();
  });
});

renderActivities();
renderResults();

if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
</script>
</body>
</html>
