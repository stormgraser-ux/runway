<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/main.css">
<title>Runway</title>
</head>
<body>

<!-- Dashboard -->
<div id="page-dashboard" class="page">
  <h1>Runway</h1>
  <p class="subtitle">Your financial picture</p>
  <div id="dashboard-content"></div>
</div>

<!-- Pick -->
<div id="page-pick" class="page">
  <h1>What am I doing?</h1>
  <p class="subtitle">Tap activities, get cards</p>
  <div class="activity-grid" id="activity-grid"></div>
  <div id="results"></div>
</div>

<!-- Caps -->
<div id="page-caps" class="page">
  <h1>Cap Tracker</h1>
  <p class="subtitle">Update spend to track bonus limits</p>
  <div id="caps-list"></div>
</div>

<!-- Bills -->
<div id="page-bills" class="page">
  <h1>Bills</h1>
  <p class="subtitle">Monthly obligations &amp; splits</p>
  <div id="bills-content"></div>
</div>

<!-- GF Board -->
<div id="page-board" class="page">
  <h1>Board</h1>
  <p class="subtitle">Angely's monthly balance</p>
  <div id="board-content"></div>
</div>

<!-- All Cards (overflow) -->
<div id="page-cards" class="page">
  <h1>All Cards</h1>
  <p class="subtitle">Full reference</p>
  <div id="all-cards-list"></div>
</div>

<!-- Digest (overflow) -->
<div id="page-digest" class="page">
  <h1>Weekly Digest</h1>
  <p class="subtitle">Latest financial summary</p>
  <div id="digest-content"></div>
</div>

<!-- GF Board Modal -->
<div id="board-modal" class="board-modal">
  <div class="board-modal-content">
    <h3 id="modal-title">Add Entry</h3>
    <div id="modal-receipt-field" class="board-field" style="display:none">
      <label>Receipt Total</label>
      <input id="modal-receipt" type="number" inputmode="decimal" placeholder="Full receipt amount">
    </div>
    <div class="board-field">
      <label>Amount (her half for groceries)</label>
      <input id="modal-amount" type="number" inputmode="decimal" placeholder="0.00">
    </div>
    <div id="modal-method-field" class="board-field" style="display:none">
      <label>Method</label>
      <select id="modal-method">
        <option value="Cash">Cash</option>
        <option value="Venmo">Venmo</option>
        <option value="Check">Check</option>
      </select>
    </div>
    <div class="board-modal-actions">
      <button id="modal-cancel" class="cancel">Cancel</button>
      <button id="modal-confirm" class="confirm">Add</button>
    </div>
  </div>
</div>

<!-- Bottom Navigation -->
<div class="nav">
  <button data-page="dashboard"><span class="icon">&#x1F4CA;</span>Dashboard</button>
  <button data-page="pick"><span class="icon">&#x1F4B3;</span>Pick</button>
  <button data-page="caps"><span class="icon">&#x1F4C8;</span>Caps</button>
  <button data-page="bills"><span class="icon">&#x1F4C4;</span>Bills</button>
  <button data-page="board"><span class="icon">&#x1F4CB;</span>Board</button>
  <div class="nav-overflow-wrap">
    <button id="overflow-toggle"><span class="icon">&#x22EF;</span>More</button>
    <div id="overflow-menu" class="overflow-menu">
      <button data-page="cards"><span class="icon">&#x1F4CB;</span> All Cards</button>
      <button data-page="digest"><span class="icon">&#x1F4D1;</span> Digest</button>
    </div>
  </div>
</div>

<!-- Scripts: order matters (data-manager first, then modules, then app) -->
<script src="js/data-manager.js"></script>
<script src="js/pick.js"></script>
<script src="js/cards.js"></script>
<script src="js/caps.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/bills.js"></script>
<script src="js/gf-board.js"></script>
<script src="js/digest.js"></script>
<script src="js/app.js"></script>
</body>
</html>
